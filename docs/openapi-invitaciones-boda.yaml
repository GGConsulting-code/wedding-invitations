openapi: 3.1.0
info:
  title: API de Invitaciones Digitales de Boda
  version: 1.0.0
  description: Contrato REST propuesto para el frontend de administracion y la invitacion publica.
servers:
  - url: https://api.example.com
    description: Produccion
  - url: http://localhost:8080
    description: Desarrollo local
security: []
tags:
  - name: Authentication
  - name: Admin Wedding Config
  - name: Admin Invitations
  - name: Public Invitation
paths:
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Autentica a un administrador
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/auth/me:
    get:
      tags: [Authentication]
      summary: Valida la sesion y devuelve el usuario actual
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Revoca o finaliza la sesion actual
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sesion finalizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/admin/wedding-config:
    get:
      tags: [Admin Wedding Config]
      summary: Obtiene la configuracion editable de la boda
      operationId: getWeddingConfig
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Configuracion obtenida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeddingConfigResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
    put:
      tags: [Admin Wedding Config]
      summary: Reemplaza la configuracion editable de la boda
      operationId: updateWeddingConfig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeddingConfigUpdateRequest'
      responses:
        '200':
          description: Configuracion actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeddingConfigResponse'
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/v1/admin/dashboard/attendance:
    get:
      tags: [Admin Invitations]
      summary: Obtiene el resumen de confirmaciones
      operationId: getAttendanceSummary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Resumen obtenido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSummaryResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /api/v1/admin/invitations:
    get:
      tags: [Admin Invitations]
      summary: Lista invitaciones generadas
      operationId: listInvitations
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: {type: integer, minimum: 0, default: 0}
        - in: query
          name: size
          schema: {type: integer, minimum: 1, maximum: 100, default: 20}
        - in: query
          name: status
          schema: {$ref: '#/components/schemas/RsvpStatus'}
        - in: query
          name: search
          schema: {type: string, maxLength: 120}
        - in: query
          name: sort
          schema: {type: string, default: 'createdAt,desc'}
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationListResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      tags: [Admin Invitations]
      summary: Persiste una invitacion y genera su URL canonica
      operationId: createInvitation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
      responses:
        '201':
          description: Invitacion creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/v1/public/invitations/{publicToken}:
    get:
      tags: [Public Invitation]
      summary: Obtiene una invitacion publica por token
      operationId: getPublicInvitation
      parameters:
        - $ref: '#/components/parameters/PublicToken'
      responses:
        '200':
          description: Invitacion publica
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicInvitationResponse'
        '404': {$ref: '#/components/responses/NotFound'}
        '410': {$ref: '#/components/responses/Gone'}
        '429': {$ref: '#/components/responses/TooManyRequests'}
  /api/v1/public/invitations/{publicToken}/rsvp:
    put:
      tags: [Public Invitation]
      summary: Establece la respuesta de asistencia
      operationId: updateRsvp
      parameters:
        - $ref: '#/components/parameters/PublicToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RsvpRequest'
      responses:
        '200':
          description: RSVP actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RsvpResponse'
        '400': {$ref: '#/components/responses/ValidationError'}
        '404': {$ref: '#/components/responses/NotFound'}
        '410': {$ref: '#/components/responses/Gone'}
        '429': {$ref: '#/components/responses/TooManyRequests'}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PublicToken:
      in: path
      name: publicToken
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Error de validacion
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Unauthorized:
      description: Credenciales o token invalidos
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Forbidden:
      description: El usuario no tiene permisos
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Conflict:
      description: Conflicto o solicitud duplicada
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Gone:
      description: Invitacion desactivada o expirada
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    TooManyRequests:
      description: Limite de solicitudes excedido
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
  schemas:
    RsvpStatus:
      type: string
      enum: [PENDING, CONFIRMED, DECLINED]
    Role:
      type: string
      enum: [ADMIN]
    FieldError:
      type: object
      additionalProperties: false
      properties:
        field: {type: [string, 'null']}
        code: {type: string}
        message: {type: string}
      required: [code, message]
    ApiMeta:
      type: [object, 'null']
      additionalProperties: true
    BaseEnvelope:
      type: object
      properties:
        success: {type: boolean}
        code: {type: string}
        message: {type: string}
        errors:
          type: array
          items: {$ref: '#/components/schemas/FieldError'}
        meta: {$ref: '#/components/schemas/ApiMeta'}
        timestamp: {type: string, format: date-time}
        traceId: {type: string, format: uuid}
      required: [success, code, message, errors, timestamp, traceId]
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: false}
            data: {type: 'null'}
          required: [data]
    EmptySuccessResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data: {type: object, additionalProperties: false}
          required: [data]
    LoginRequest:
      type: object
      additionalProperties: false
      properties:
        username: {type: string, minLength: 3, maxLength: 80}
        password: {type: string, minLength: 8, maxLength: 128}
      required: [username, password]
    User:
      type: object
      additionalProperties: false
      properties:
        id: {type: string, format: uuid}
        username: {type: string}
        displayName: {type: string}
        roles:
          type: array
          minItems: 1
          items: {$ref: '#/components/schemas/Role'}
      required: [id, username, displayName, roles]
    AuthData:
      type: object
      additionalProperties: false
      properties:
        accessToken: {type: string, minLength: 20}
        tokenType: {type: string, const: Bearer}
        expiresIn: {type: integer, minimum: 60}
        user: {$ref: '#/components/schemas/User'}
      required: [accessToken, tokenType, expiresIn, user]
    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data: {$ref: '#/components/schemas/AuthData'}
          required: [data]
    CurrentUserResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data:
              type: object
              properties:
                user: {$ref: '#/components/schemas/User'}
              required: [user]
          required: [data]
    Address:
      type: object
      additionalProperties: false
      properties:
        venueName: {type: string, minLength: 2, maxLength: 160}
        formattedAddress: {type: string, minLength: 5, maxLength: 300}
        mapEmbedUrl: {type: string, format: uri, pattern: '^https://'}
        mapsNavigationUrl: {type: string, format: uri, pattern: '^https://'}
      required: [venueName, formattedAddress, mapsNavigationUrl]
    Photo:
      type: object
      additionalProperties: false
      properties:
        id: {type: string, minLength: 1, maxLength: 80}
        url: {type: string, format: uri, pattern: '^https://'}
        altText: {type: string, minLength: 1, maxLength: 180}
        sortOrder: {type: integer, minimum: 0}
      required: [id, url, altText, sortOrder]
    Audio:
      type: object
      additionalProperties: false
      properties:
        url: {type: string, format: uri, pattern: '^https://'}
        title: {type: string, maxLength: 120}
        artist: {type: string, maxLength: 120}
        autoplay: {type: boolean, default: true}
        loop: {type: boolean, default: true}
      required: [url, autoplay, loop]
    WeddingConfig:
      type: object
      additionalProperties: false
      properties:
        id: {type: string, format: uuid}
        version: {type: integer, minimum: 1}
        coupleDisplayName: {type: string, minLength: 2, maxLength: 160}
        presentationText: {type: string, minLength: 10, maxLength: 1200}
        weddingDateTime: {type: string, format: date-time}
        timeZone: {type: string, example: America/Mexico_City}
        address: {$ref: '#/components/schemas/Address'}
        photos:
          type: array
          maxItems: 20
          items: {$ref: '#/components/schemas/Photo'}
        audio: {$ref: '#/components/schemas/Audio'}
        updatedAt: {type: string, format: date-time}
      required: [id, version, coupleDisplayName, presentationText, weddingDateTime, timeZone, address, photos, audio, updatedAt]
    WeddingConfigUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        version: {type: integer, minimum: 1, description: Control de concurrencia optimista}
        coupleDisplayName: {type: string, minLength: 2, maxLength: 160}
        presentationText: {type: string, minLength: 10, maxLength: 1200}
        weddingDateTime: {type: string, format: date-time}
        timeZone: {type: string}
        address: {$ref: '#/components/schemas/Address'}
        photos:
          type: array
          maxItems: 20
          items: {$ref: '#/components/schemas/Photo'}
        audio: {$ref: '#/components/schemas/Audio'}
      required: [version, coupleDisplayName, presentationText, weddingDateTime, timeZone, address, photos, audio]
    WeddingConfigResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data: {$ref: '#/components/schemas/WeddingConfig'}
          required: [data]
    AttendanceSummary:
      type: object
      additionalProperties: false
      properties:
        confirmed: {type: integer, minimum: 0}
        declined: {type: integer, minimum: 0}
        pending: {type: integer, minimum: 0}
        total: {type: integer, minimum: 0}
      required: [confirmed, declined, pending, total]
    AttendanceSummaryResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data: {$ref: '#/components/schemas/AttendanceSummary'}
          required: [data]
    Invitation:
      type: object
      additionalProperties: false
      properties:
        id: {type: string, format: uuid}
        recipientName: {type: string, minLength: 2, maxLength: 160}
        publicUrl: {type: string, format: uri}
        status: {$ref: '#/components/schemas/RsvpStatus'}
        channel: {type: string, enum: [WHATSAPP, COPY_LINK, OTHER]}
        createdAt: {type: string, format: date-time}
        respondedAt: {type: [string, 'null'], format: date-time}
      required: [id, recipientName, publicUrl, status, channel, createdAt, respondedAt]
    CreateInvitationRequest:
      type: object
      additionalProperties: false
      properties:
        recipientName: {type: string, minLength: 2, maxLength: 160}
        publicToken: {type: string, format: uuid}
        channel: {type: string, enum: [WHATSAPP, COPY_LINK, OTHER], default: WHATSAPP}
        clientRequestId: {type: string, format: uuid, description: Clave de idempotencia de negocio}
      required: [recipientName, publicToken, channel, clientRequestId]
    InvitationResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data: {$ref: '#/components/schemas/Invitation'}
          required: [data]
    PaginationMeta:
      type: object
      additionalProperties: false
      properties:
        page: {type: integer, minimum: 0}
        size: {type: integer, minimum: 1}
        totalElements: {type: integer, minimum: 0}
        totalPages: {type: integer, minimum: 0}
        first: {type: boolean}
        last: {type: boolean}
      required: [page, size, totalElements, totalPages, first, last]
    InvitationListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data:
              type: array
              items: {$ref: '#/components/schemas/Invitation'}
            meta:
              type: object
              properties:
                pagination: {$ref: '#/components/schemas/PaginationMeta'}
              required: [pagination]
          required: [data, meta]
    PublicInvitationData:
      type: object
      additionalProperties: false
      properties:
        invitation:
          type: object
          additionalProperties: false
          properties:
            recipientName: {type: string}
            status: {$ref: '#/components/schemas/RsvpStatus'}
          required: [recipientName, status]
        event:
          type: object
          additionalProperties: false
          properties:
            coupleDisplayName: {type: string}
            presentationText: {type: string}
            weddingDateTime: {type: string, format: date-time}
            timeZone: {type: string}
            address: {$ref: '#/components/schemas/Address'}
            photos:
              type: array
              items: {$ref: '#/components/schemas/Photo'}
            audio: {$ref: '#/components/schemas/Audio'}
          required: [coupleDisplayName, presentationText, weddingDateTime, timeZone, address, photos, audio]
      required: [invitation, event]
    PublicInvitationResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data: {$ref: '#/components/schemas/PublicInvitationData'}
          required: [data]
    RsvpRequest:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [CONFIRMED, DECLINED]
        respondedAtClient:
          type: [string, 'null']
          format: date-time
          description: Dato informativo; el servidor genera la fecha oficial
      required: [status]
    RsvpData:
      type: object
      additionalProperties: false
      properties:
        status: {$ref: '#/components/schemas/RsvpStatus'}
        respondedAt: {type: string, format: date-time}
      required: [status, respondedAt]
    RsvpResponse:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            success: {const: true}
            data: {$ref: '#/components/schemas/RsvpData'}
          required: [data]
